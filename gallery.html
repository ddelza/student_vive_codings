<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: transparent; margin: 0; padding: 15px; }

    .search-container {
      display: flex;
      gap: 10px;
      justify-content: center;
      max-width: 600px;
      margin: 0 auto 25px auto;
    }
    #searchInput {
      flex: 1;
      padding: 12px 20px;
      border: 1px solid #ccc; border-radius: 25px; font-size: 15px;
      outline: none; transition: border-color 0.3s, box-shadow 0.3s;
      box-sizing: border-box; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    #searchInput:focus { border-color: #3498db; box-shadow: 0 2px 8px rgba(52, 152, 219, 0.3); }

    #sortSelect {
      padding: 12px 15px;
      border: 1px solid #ccc; border-radius: 25px; font-size: 14px;
      outline: none; cursor: pointer; background-color: white; color: #2c3e50;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: border-color 0.3s;
    }
    #sortSelect:focus { border-color: #3498db; }

    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
    .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 5px solid #3498db; display: flex; flex-direction: column;}
    .title { font-weight: bold; font-size: 16px; margin-bottom: 5px; color: #2c3e50; }
    .author { font-size: 12px; color: #7f8c8d; margin-bottom: 15px; }
    .empty-message { text-align: center; color: #7f8c8d; grid-column: 1 / -1; padding: 20px; }

    .btn-group { margin-top: auto; display: flex; flex-direction: column; gap: 8px; }
    .btn { display: inline-block; padding: 8px 12px; background: #3498db; color: white; text-decoration: none; border-radius: 4px; font-size: 13px; text-align: center; cursor: pointer; border: none; transition: background 0.2s;}
    .btn:hover { background: #2980b9; }
    .btn-file { background: #e67e22; }
    .btn-file:hover { background: #d35400; }

    .btn-like { background: #ff4757; font-weight: bold; border: 1px solid #ff4757; color: white; }
    .btn-like:hover { background: #ff6b81; border-color: #ff6b81; }
    .btn-like:disabled { background: #f1f2f6; color: #a4b0be; border-color: #ced6e0; cursor: not-allowed; }
    .btn-like-toggle { background: #f1f2f6; color: #576574; border: 1px solid #ced6e0; padding: 0 12px; font-size: 11px; border-radius: 4px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
    .btn-like-toggle:hover { background: #dfe4ea; border-color: #a4b0be; }
    .like-names-dropdown { display: none; font-size: 12px; background: #f8f9fa; padding: 10px; border-radius: 4px; border: 1px solid #e1e8ed; margin-top: 5px; color: #2f3640; word-break: keep-all; line-height: 1.5; box-shadow: inset 0 1px 3px rgba(0,0,0,0.05); }
  </style>
</head>
<body>

  <div class="search-container">
    <input type="text" id="searchInput" placeholder="🔍 이름, 학년, 반 또는 작품명으로 검색..." onkeyup="filterAndSortGallery()">
    <select id="sortSelect" onchange="filterAndSortGallery()">
      <option value="latest">제출 최신순</option>
      <option value="class">학급순</option>
      <option value="likes">좋아요 많은 순</option>
    </select>
  </div>

  <div class="gallery-grid" id="gallery">
    <p class="empty-message">📡 학생들의 작품을 불러오는 중입니다...</p>
  </div>

  <script>
    var GAS_URL = "https://script.google.com/macros/s/AKfycbzyeRDa2Swq71UlKMysPkDRxviqf6qTHNAJvwVRZxbT0d5KKn9_H2ehU8WU8xjjUzNeoQ/exec";
    var allProjects = [];

    function gasGet(params) {
      var url = GAS_URL + '?' + Object.keys(params).map(function(k) {
        return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
      }).join('&');
      return fetch(url).then(function(r) { return r.json(); });
    }

    function gasPost(data) {
      return fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify(data),
        headers: { 'Content-Type': 'text/plain' }
      }).then(function(r) { return r.json(); });
    }

    window.onload = function() {
      if (typeof google !== 'undefined' && google.script) {
        // GAS 내부 환경 (배포 URL로 접근)
        google.script.run.withSuccessHandler(function(projects) {
          projects.forEach(function(p, i) { p.originalIndex = i; });
          allProjects = projects;
          filterAndSortGallery();
        }).getStudentProjects();
      } else {
        // GitHub Pages 환경 — fetch로 GAS JSON API 호출
        gasGet({ action: 'getProjects' }).then(function(projects) {
          projects.forEach(function(p, i) { p.originalIndex = i; });
          allProjects = projects;
          filterAndSortGallery();
        }).catch(function(err) {
          document.getElementById('gallery').innerHTML =
            '<p class="empty-message">❌ 데이터를 불러오지 못했습니다: ' + err + '</p>';
        });
      }
    };

    function renderGallery(projects) {
      var container = document.getElementById('gallery');
      container.innerHTML = '';

      if (projects.length === 0) {
        container.innerHTML = '<p class="empty-message">해당하는 작품이 없습니다.</p>';
        return;
      }

      projects.forEach(function(project) {
        var card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = '<div class="title">' + project.projectName + '</div>'
                       + '<div class="author">' + project.studentInfo + '</div>';

        var btnGroup = document.createElement('div');
        btnGroup.className = 'btn-group';

        // 작품 실행/보기 버튼
        if (project.isHtmlCode) {
          var blob    = new Blob([project.codeText], { type: 'text/html;charset=utf-8' });
          var blobUrl = URL.createObjectURL(blob);
          var link    = document.createElement('a');
          link.className = 'btn';
          link.innerHTML = '▶️ 작품 실행하기';
          link.href = blobUrl;
          link.target = '_blank';
          btnGroup.appendChild(link);
        } else if (project.fileUrl !== "없음") {
          var link = document.createElement('a');
          link.className = 'btn btn-file';
          link.href = project.fileUrl;
          link.target = '_blank';
          link.innerHTML = '📄 코드 파일 보기';
          btnGroup.appendChild(link);
        }

        // 좋아요 버튼
        var likesArray = project.likes ? project.likes.split(',').filter(Boolean) : [];

        var likeContainer = document.createElement('div');
        likeContainer.style.cssText = 'display:flex; flex-direction:column;';

        var likeTopRow = document.createElement('div');
        likeTopRow.style.cssText = 'display:flex; gap:5px;';

        var likeBtn = document.createElement('button');
        likeBtn.className = 'btn btn-like';
        likeBtn.style.flex = '1';

        var toggleBtn    = null;
        var namesDropdown = null;

        if (likesArray.length > 0) {
          likeBtn.innerHTML = '❤️ ' + likesArray.length + '명';

          toggleBtn = document.createElement('button');
          toggleBtn.className = 'btn btn-like-toggle';
          toggleBtn.innerHTML = '목록 ▼';

          namesDropdown = document.createElement('div');
          namesDropdown.className = 'like-names-dropdown';
          namesDropdown.innerHTML = project.likes.split(',').join(', ');

          toggleBtn.onclick = function() {
            var open = namesDropdown.style.display === 'block';
            namesDropdown.style.display = open ? 'none' : 'block';
            toggleBtn.innerHTML = open ? '목록 ▼' : '목록 ▲';
          };
        } else {
          likeBtn.innerHTML = '🤍 좋아요 누르기';
        }

        likeBtn.onclick = function() {
          var likerName = prompt('작품이 마음에 드시나요? 이름을 남겨주세요! (예: 홍길동)');
          if (!likerName || likerName.trim() === '') return;
          likerName = likerName.trim();
          likeBtn.disabled = true;
          likeBtn.innerHTML = '저장 중... ⏳';

          var doLike;
          if (typeof google !== 'undefined' && google.script) {
            doLike = new Promise(function(resolve, reject) {
              google.script.run
                .withSuccessHandler(function(likes) { resolve({ success: true, likes: likes }); })
                .withFailureHandler(function(err)   { reject(err); })
                .addLike(project.rowIndex, likerName);
            });
          } else {
            doLike = gasPost({ action: 'addLike', rowIndex: project.rowIndex, likerName: likerName });
          }

          doLike.then(function(res) {
            if (res.success) {
              project.likes = res.likes;
            }
            filterAndSortGallery();
          }).catch(function(err) {
            alert('앗! 오류가 발생했어요: ' + (err.message || err));
            filterAndSortGallery();
          });
        };

        likeTopRow.appendChild(likeBtn);
        if (toggleBtn) likeTopRow.appendChild(toggleBtn);
        likeContainer.appendChild(likeTopRow);
        if (namesDropdown) likeContainer.appendChild(namesDropdown);

        btnGroup.appendChild(likeContainer);
        card.appendChild(btnGroup);
        container.appendChild(card);
      });
    }

    function filterAndSortGallery() {
      var searchTerm = document.getElementById('searchInput').value.toLowerCase();
      var sortType   = document.getElementById('sortSelect').value;

      var filtered = allProjects.filter(function(p) {
        return (p.projectName + ' ' + p.studentInfo).toLowerCase().includes(searchTerm);
      });

      filtered.sort(function(a, b) {
        if (sortType === 'class') {
          var parse = function(info) {
            var m = info.match(/(\d+)학년\s*(\d+)반\s*(\d+)번/);
            return m ? parseInt(m[1])*10000 + parseInt(m[2])*100 + parseInt(m[3]) : 999999;
          };
          var diff = parse(a.studentInfo) - parse(b.studentInfo);
          return diff !== 0 ? diff : a.originalIndex - b.originalIndex;
        } else if (sortType === 'likes') {
          var la = a.likes ? a.likes.split(',').filter(Boolean).length : 0;
          var lb = b.likes ? b.likes.split(',').filter(Boolean).length : 0;
          return la !== lb ? lb - la : a.originalIndex - b.originalIndex;
        } else {
          return a.originalIndex - b.originalIndex;
        }
      });

      renderGallery(filtered);
    }
  </script>
</body>
</html>
