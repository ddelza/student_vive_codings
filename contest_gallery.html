<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>디지털 시민성 바이브코딩 대회 - 작품 갤러리</title>
<style>
  body { font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; background: #f4f6fb; margin: 0; padding: 24px; color: #1c2238; }
  h1 { text-align: center; font-size: 20px; margin: 0 0 18px; }
  .search-container { display: flex; justify-content: center; max-width: 500px; margin: 0 auto 24px; }
  #searchInput {
    width: 100%; padding: 12px 18px; border: 1px solid #d8dee8; border-radius: 999px; font-size: 14px;
    outline: none; box-shadow: 0 2px 6px rgba(20,30,60,.05); box-sizing: border-box;
  }
  #searchInput:focus { border-color: #2d6cdf; }
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px;
    max-width: 1200px; margin: 0 auto;
  }
  .card {
    background: #fff; border-radius: 12px; padding: 18px; box-shadow: 0 2px 8px rgba(20,30,60,.06);
    border-left: 5px solid #2d6cdf; display: flex; flex-direction: column;
  }
  .card .title { font-size: 16px; font-weight: bold; margin-bottom: 4px; }
  .card .author { font-size: 12px; color: #7f8c8d; margin-bottom: 12px; }
  .card .label { font-size: 11.5px; font-weight: bold; color: #2d6cdf; margin-top: 6px; }
  .card .text { font-size: 13px; line-height: 1.5; margin-top: 2px; white-space: pre-wrap; word-break: break-word; }
  .card .link-btn {
    margin-top: 14px; display: inline-block; text-align: center; padding: 9px; border-radius: 8px;
    background: #2d6cdf; color: #fff; text-decoration: none; font-size: 13px; font-weight: bold;
  }
  .card .link-btn:hover { background: #1f56b8; }
  .card .no-link {
    margin-top: 14px; text-align: center; padding: 9px; border-radius: 8px; background: #f1f2f6;
    color: #7f8c8d; font-size: 12.5px;
  }
  .empty-message { text-align: center; color: #7f8c8d; grid-column: 1 / -1; padding: 30px; }
</style>
</head>
<body>

<h1>🖼️ 디지털 시민성 바이브코딩 대회 작품 갤러리</h1>
<div class="search-container">
  <input type="text" id="searchInput" placeholder="🔍 이름, 학번, 작품명으로 검색..." onkeyup="filterEntries()">
</div>
<div class="grid" id="gallery">
  <p class="empty-message">불러오는 중...</p>
</div>

<script>
var APP_URL = 'https://script.google.com/macros/s/AKfycbzyeRDa2Swq71UlKMysPkDRxviqf6qTHNAJvwVRZxbT0d5KKn9_H2ehU8WU8xjjUzNeoQ/exec';
var allEntries = [];

function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function renderCard(entry) {
  var linkHtml = entry.link
    ? '<a class="link-btn" href="' + escapeHtml(entry.link) + '" target="_blank" rel="noopener">🔗 작품 열어보기</a>'
    : '<div class="no-link">아직 링크 없음 (아이디어 단계)</div>';

  return '<div class="card">' +
    '<div class="title">' + escapeHtml(entry.title) + '</div>' +
    '<div class="author">' + escapeHtml(entry.studentName) + ' (' + escapeHtml(entry.studentId) + ')</div>' +
    '<div class="label">누구를 위한 앱인가요?</div>' +
    '<div class="text">' + escapeHtml(entry.forWhom) + '</div>' +
    '<div class="label">기능 설명</div>' +
    '<div class="text">' + escapeHtml(entry.description) + '</div>' +
    linkHtml +
  '</div>';
}

function renderGallery(entries) {
  var gallery = document.getElementById('gallery');
  if (entries.length === 0) {
    gallery.innerHTML = '<p class="empty-message">아직 제출된 작품이 없어요.</p>';
    return;
  }
  gallery.innerHTML = entries.map(renderCard).join('');
}

function filterEntries() {
  var keyword = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!keyword) { renderGallery(allEntries); return; }
  var filtered = allEntries.filter(function (e) {
    return (e.studentName + e.studentId + e.title).toLowerCase().indexOf(keyword) !== -1;
  });
  renderGallery(filtered);
}

fetch(APP_URL + '?action=getContestEntries')
  .then(function (r) { return r.json(); })
  .then(function (entries) {
    allEntries = entries;
    renderGallery(allEntries);
  })
  .catch(function () {
    document.getElementById('gallery').innerHTML = '<p class="empty-message">불러오기에 실패했습니다. 잠시 후 새로고침해주세요.</p>';
  });
</script>
</body>
</html>
